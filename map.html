<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch Map - FishTrack Africa</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <meta name="theme-color" content="#1a2840">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FishTrack">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/map.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
</head>
<body class="map-page">
    <header class="main-header" style="position: fixed; top: 0; left: 0; right: 0; z-index: 1000;">
        <div class="container header-content">
            <div class="logo-container">
                <img src="assets/logo.png" alt="FishTrack Africa Logo" class="logo-image" style="width: 50px; height: 50px;">
                <div class="logo-text">
                    <h1 style="font-size: 18px;">FISHTRACK AFRICA</h1>
                    <p style="font-size: 10px;">Waar Die Vis Byt</p>
                </div>
            </div>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="log-catch.html" style="background: var(--rust-orange); padding: 8px 16px; border-radius: 6px;">+ Log Catch</a>
            </nav>
        </div>
    </header>

    <!-- Filters -->
    <div class="filters-bar">
        <div class="filters-content">
            <select id="waterTypeFilter" class="filter-select">
                <option value="all">🌊 All Water Types</option>
                <option value="saltwater">🌊 Saltwater Only</option>
                <option value="freshwater">💧 Freshwater Only</option>
            </select>
        
            <select id="speciesFilter" class="filter-select">
                <option value="all">All Species</option>
                <optgroup label="Saltwater - Bottom Fish">
                    <option value="Galjoen">Galjoen</option>
                    <option value="Steenbras">Steenbras (White)</option>
                    <option value="Red Steenbras">Red Steenbras</option>
                    <option value="Kabeljou">Kabeljou</option>
                    <option value="Mosselkraker">Mosselkraker</option>
                    <option value="Kolstert">Kolstert</option>
                    <option value="Zebra">Zebra</option>
                    <option value="Strepie">Strepie</option>
                    <option value="Rooi Roman">Rooi Roman</option>
                    <option value="Blacktail">Blacktail (Dassie)</option>
                </optgroup>
                <optgroup label="Saltwater - Sharks">
                    <option value="Bronze Whaler">Bronze Whaler</option>
                    <option value="Spotted Gully">Spotted Gully</option>
                </optgroup>
                <optgroup label="Saltwater - Gamefish">
                    <option value="Elf">Elf</option>
                    <option value="Garrick">Garrick</option>
                    <option value="Snoek">Snoek</option>
                </optgroup>
                <optgroup label="Freshwater - Bass">
                    <option value="Largemouth Bass">Largemouth Bass</option>
                    <option value="Smallmouth Bass">Smallmouth Bass</option>
                </optgroup>
                <optgroup label="Freshwater - Carp">
                    <option value="Mirror Carp">Mirror Carp</option>
                    <option value="Common Carp">Common Carp</option>
                </optgroup>
            </select>

            <select id="timeFilter" class="filter-select">
                <option value="all">All Time</option>
                <option value="today">Today</option>
                <option value="week">This Week</option>
                <option value="month">This Month</option>
            </select>

            <button id="refreshBtn" class="refresh-btn" title="Refresh catches">
                🔄
            </button>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map" class="map-container"></div>

    <!-- Stats Overlay -->
    <div class="map-stats">
        <div class="stat-pill">
            <span id="catchCount">Loading...</span> catches displayed
        </div>
    </div>

    <!-- Legend -->
    <div class="map-legend">
        <h4>Species</h4>
        <div class="legend-items">
            <div class="legend-item">
                <span class="legend-marker" style="background: #2ecc71;"></span>
                <span>Galjoen</span>
            </div>
            <div class="legend-item">
                <span class="legend-marker" style="background: #3498db;"></span>
                <span>Steenbras</span>
            </div>
            <div class="legend-item">
                <span class="legend-marker" style="background: #e74c3c;"></span>
                <span>Kob</span>
            </div>
            <div class="legend-item">
                <span class="legend-marker" style="background: #95a5a6;"></span>
                <span>Sharks</span>
            </div>
            <div class="legend-item">
                <span class="legend-marker" style="background: #f39c12;"></span>
                <span>Gamefish</span>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner">🎣</div>
        <p>Loading catches...</p>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/map.js"></script>
    
    <!-- PWA Install Script -->
    <script src="js/pwa-install.js"></script>
</body>
</html>
